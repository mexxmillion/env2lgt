# env2lgt-dap — DAP inference environment
#
# Like environment-da2.yml, this ONLY creates an empty Python conda env with
# pip and git. torch + DAP + DINOv3 deps come from pip (see requirements-dap.txt
# and README.md) because torch needs the CUDA wheel index and DAP lives in a
# git repo installed as `pip install -e`.
#
# Usage:
#   conda env create -f environment-dap.yml -p E:\conda\envs\env2lgt-dap
#   conda activate E:\conda\envs\env2lgt-dap
#
#   :: torch (DAP pins ~2.7.1 — UNTESTED, adjust to whatever DAP's repo wants)
#   pip install --index-url https://download.pytorch.org/whl/cu124 ^
#       torch==2.7.1 torchvision==0.22.1
#   git clone https://github.com/Insta360-Research-Team/DAP E:\models\DAP
#   pip install -e E:\models\DAP
#   pip install -r requirements-dap.txt

name: env2lgt-dap
channels:
  - conda-forge
dependencies:
  - python=3.12
  - pip
  - git
